name: Deploy

on:
  push:
    branches: ["main"]
  workflow_dispatch:

permissions:
  contents: read
  pages: write
  id-token: write

concurrency:
  group: "pages"
  cancel-in-progress: true

jobs:
  build:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - name: Setup Pages
        uses: actions/configure-pages@v4
      - name: Prepare dist
        run: |
          mkdir -p dist
          cp index.html dist/
          cp .nojekyll dist/ 2>/dev/null || true
          cp CNAME dist/ 2>/dev/null || true
          cp -r assets dist/ 2>/dev/null || true
          cp -r public dist/ 2>/dev/null || true
          # Copy image files from root (hero, section photos)
          cp *.jpg dist/ 2>/dev/null || true
          cp *.jpeg dist/ 2>/dev/null || true
          cp *.png dist/ 2>/dev/null || true
      - uses: actions/upload-pages-artifact@v4
        with:
          path: dist
  deploy:
    needs: build
    runs-on: ubuntu-latest
    permissions:
      contents: read
      pages: write
      id-token: write
    environment:
      name: github-pages
      url: ${{ steps.deployment.outputs.page_url }}
    steps:
      - id: deployment
        uses: actions/deploy-pages@v4
