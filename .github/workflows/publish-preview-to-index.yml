name: Publish BetterMin redesign

on:
  push:
    branches: [main]
  workflow_dispatch:

permissions:
  contents: write

jobs:
  publish:
    if: github.actor != 'github-actions[bot]'
    runs-on: ubuntu-latest
    steps:
      - name: Checkout repository
        uses: actions/checkout@v4
        with:
          fetch-depth: 0

      - name: Replace index with approved preview
        run: |
          python - <<'PY'
          from pathlib import Path

          preview = Path('preview-bettermin-redesign.html')
          index = Path('index.html')

          html = preview.read_text(encoding='utf-8')

          # Remove only the upper-right navigation Demo button.
          html = html.replace('<a class="btn btn-primary" href="https://demo.bettermin.com" target="_blank" rel="noopener noreferrer">Demo</a>', '')

          index.write_text(html, encoding='utf-8')
          PY

      - name: Commit published index
        run: |
          git config user.name "github-actions[bot]"
          git config user.email "41898282+github-actions[bot]@users.noreply.github.com"
          git add index.html
          if git diff --cached --quiet; then
            echo "No changes to publish"
          else
            git commit -m "Publish BetterMin redesign to index"
            git push
          fi
